# Настройки оформления ВКР по ГОСТ 7.32-2017
# Скопируйте этот файл как config.yaml и измените нужные параметры

page:
  width_cm: 21.0
  height_cm: 29.7
  margin_left_cm: 3.0
  margin_right_cm: 1.5
  margin_top_cm: 2.0
  margin_bottom_cm: 2.0

font:
  name: "Times New Roman"
  size: 14
  size_table: 12

paragraph:
  line_spacing_twips: 360        # 1.5 межстрочный
  first_line_indent_twips: 709   # 1.25 см

image:
  max_width_cm: 15.0
  max_height_cm: 23.0
  screenshot_width_cm: 8.0
  side_by_side_width_cm: 7.0

# Рабочая директория для документов (по умолчанию — текущая)
